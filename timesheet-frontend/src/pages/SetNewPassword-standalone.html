<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 24px 32px 0;
        }

        .back-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #374151;
        }

        .content {
            padding: 32px;
            text-align: center;
        }

        .avatar {
            margin-bottom: 24px;
        }

        .avatar-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            position: relative;
        }

        .avatar-icon::before {
            content: '';
            position: absolute;
            width: 72px;
            height: 72px;
            border: 2px solid #e5e7eb;
            border-radius: 50%;
            top: -6px;
            left: -6px;
        }

        .avatar-icon span {
            color: white;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .password-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #9ca3af;
            pointer-events: none;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 16px 48px 16px 48px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 16px;
            background: #f9fafb;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-group input::placeholder {
            color: #9ca3af;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #6b7280;
        }

        .password-requirements {
            margin: 24px 0;
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }

        .password-requirements h3 {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }

        .password-requirements ul {
            list-style: none;
            padding: 0;
        }

        .password-requirements li {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 6px;
            padding-left: 20px;
            position: relative;
            line-height: 1.4;
        }

        .password-requirements li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #3b82f6;
            font-weight: bold;
        }

        .password-requirements li:last-child {
            margin-bottom: 0;
        }

        .update-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 24px;
        }

        .update-btn:hover {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .update-btn:active {
            transform: translateY(0);
        }

        /* Animation for form validation */
        .input-group input.valid {
            border-color: #10b981;
        }

        .input-group input.invalid {
            border-color: #ef4444;
        }

        .password-requirements li.valid {
            color: #10b981;
        }

        .password-requirements li.valid::before {
            color: #10b981;
        }

        /* Responsive design */
        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }
            
            .card {
                border-radius: 12px;
            }
            
            .header {
                padding: 20px 24px 0;
            }
            
            .content {
                padding: 24px;
            }
            
            .title {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 14px;
                margin-bottom: 24px;
            }
            
            .input-group input {
                padding: 14px 44px 14px 44px;
                font-size: 15px;
            }
            
            .update-btn {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <a href="#" class="back-link">← Back to Sign In</a>
            </div>
            
            <div class="content">
                <div class="avatar">
                    <div class="avatar-icon">
                        <span>A</span>
                    </div>
                </div>
                
                <h1 class="title">Set New Password</h1>
                <p class="subtitle">Choose a strong password for your account</p>
                
                <form class="password-form">
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0110 0v4"></path>
                                </svg>
                            </div>
                            <input type="password" placeholder="New Password" id="newPassword" required>
                            <button type="button" class="toggle-password" data-target="newPassword">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0110 0v4"></path>
                                </svg>
                            </div>
                            <input type="password" placeholder="Confirm Password" id="confirmPassword" required>
                            <button type="button" class="toggle-password" data-target="confirmPassword">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="password-requirements">
                        <h3>Password requirements</h3>
                        <ul>
                            <li>At least 8 characters long</li>
                            <li>Include uppercase and lowercase letters</li>
                            <li>Include numbers and special characters</li>
                        </ul>
                    </div>
                    
                    <button type="submit" class="update-btn">Update Password</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Password visibility toggle functionality
            const toggleButtons = document.querySelectorAll('.toggle-password');
            
            toggleButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.innerHTML = `
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        `;
                    } else {
                        input.type = 'password';
                        this.innerHTML = `
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        `;
                    }
                });
            });
            
            // Password validation functionality
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const form = document.querySelector('.password-form');
            const requirements = document.querySelectorAll('.password-requirements li');
            
            function validatePassword(password) {
                const results = {
                    length: password.length >= 8,
                    hasLowercase: /[a-z]/.test(password),
                    hasUppercase: /[A-Z]/.test(password),
                    hasNumber: /\d/.test(password),
                    hasSpecial: /[!@#$%^&*(),.?":{}|<>]/.test(password)
                };
                
                // Update requirement indicators
                requirements[0].classList.toggle('valid', results.length);
                requirements[1].classList.toggle('valid', results.hasLowercase && results.hasUppercase);
                requirements[2].classList.toggle('valid', results.hasNumber && results.hasSpecial);
                
                return results;
            }
            
            function checkPasswordStrength(password) {
                const validation = validatePassword(password);
                const allValid = validation.length && validation.hasLowercase && validation.hasUppercase && validation.hasNumber && validation.hasSpecial;
                
                newPasswordInput.classList.toggle('valid', allValid);
                newPasswordInput.classList.toggle('invalid', password.length > 0 && !allValid);
                
                return allValid;
            }
            
            function checkPasswordsMatch() {
                const match = newPasswordInput.value === confirmPasswordInput.value && confirmPasswordInput.value.length > 0;
                confirmPasswordInput.classList.toggle('valid', match);
                confirmPasswordInput.classList.toggle('invalid', confirmPasswordInput.value.length > 0 && !match);
                return match;
            }
            
            // Real-time validation
            newPasswordInput.addEventListener('input', function() {
                checkPasswordStrength(this.value);
                if (confirmPasswordInput.value) {
                    checkPasswordsMatch();
                }
            });
            
            confirmPasswordInput.addEventListener('input', function() {
                checkPasswordsMatch();
            });
            
            // Form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const isPasswordValid = checkPasswordStrength(newPasswordInput.value);
                const doPasswordsMatch = checkPasswordsMatch();
                
                if (isPasswordValid && doPasswordsMatch) {
                    // Simulate password update
                    const updateBtn = document.querySelector('.update-btn');
                    const originalText = updateBtn.textContent;
                    
                    updateBtn.textContent = 'Updating...';
                    updateBtn.disabled = true;
                    
                    // Simulate API call
                    setTimeout(() => {
                        updateBtn.textContent = 'Password Updated!';
                        updateBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                        
                        setTimeout(() => {
                            alert('Password successfully updated!');
                        }, 1500);
                    }, 1500);
                } else {
                    // Show error message
                    if (!isPasswordValid) {
                        newPasswordInput.classList.add('invalid');
                        newPasswordInput.focus();
                    } else if (!doPasswordsMatch) {
                        confirmPasswordInput.classList.add('invalid');
                        confirmPasswordInput.focus();
                    }
                }
            });
            
            // Back to sign in link
            document.querySelector('.back-link').addEventListener('click', function(e) {
                e.preventDefault();
                alert('Navigate back to sign in page');
            });
        });
    </script>
</body>
</html>
